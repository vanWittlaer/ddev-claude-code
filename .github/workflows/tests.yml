name: tests
on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '01 06 * * 01'  # 06:01 every Monday
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  tests:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ddev
        run: |
          # No version arg installs the latest stable release.
          curl -fsSL https://ddev.com/install.sh | bash
          ddev version

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run tests
        run: bats ./tests/test.bats
